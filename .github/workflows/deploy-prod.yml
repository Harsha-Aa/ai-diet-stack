name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  ci-checks:
    name: Run CI Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-production:
    name: Deploy to Production Environment
    runs-on: ubuntu-latest
    needs: [ci-checks]
    environment:
      name: production
      url: https://api.ai-diet-system.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          role-duration-seconds: 3600
      
      - name: Create deployment backup
        run: |
          echo "Creating backup of current production state..."
          aws cloudformation describe-stacks \
            --stack-name AiDietMealRecommendationStack-prod \
            --output json > prod-stack-backup-$(date +%Y%m%d-%H%M%S).json || true
      
      - name: Deploy to Production
        run: npm run cdk:deploy -- --all --require-approval never -c stage=prod
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID_PROD }}
          CDK_DEFAULT_REGION: us-east-1
      
      - name: Get API Gateway URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name AiDietMealRecommendationStack-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
      
      - name: Tag deployment
        run: |
          git tag -a "prod-$(date +%Y%m%d-%H%M%S)" -m "Production deployment: ${{ github.sha }}"
      
      - name: Save deployment info
        run: |
          echo "Production Deployment" > deployment-info.txt
          echo "=====================" >> deployment-info.txt
          echo "Deployed at: $(date)" >> deployment-info.txt
          echo "API URL: ${{ steps.get-api-url.outputs.api_url }}" >> deployment-info.txt
          echo "Commit: ${{ github.sha }}" >> deployment-info.txt
          echo "Branch: ${{ github.ref_name }}" >> deployment-info.txt
          echo "Deployed by: ${{ github.actor }}" >> deployment-info.txt
      
      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: prod-deployment-info
          path: deployment-info.txt
          retention-days: 365

  smoke-tests:
    name: Run Production Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-production]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1
      
      - name: Get API Gateway URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name AiDietMealRecommendationStack-prod \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "API_URL=$API_URL" >> $GITHUB_ENV
      
      - name: Test API health endpoint
        run: |
          echo "Testing production health endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" $API_URL/health || echo "000")
          if [ "$response" != "200" ]; then
            echo "❌ Health check failed with status code: $response"
            exit 1
          fi
          echo "✅ Health check passed"
      
      - name: Test authentication endpoint availability
        run: |
          echo "Testing authentication endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" $API_URL/auth/login -X POST -H "Content-Type: application/json" -d '{}' || echo "000")
          if [ "$response" != "400" ] && [ "$response" != "401" ]; then
            echo "❌ Auth endpoint check failed with unexpected status code: $response"
            exit 1
          fi
          echo "✅ Auth endpoint is responding"
      
      - name: Test API response time
        run: |
          echo "Testing API response time..."
          start_time=$(date +%s%N)
          curl -s -o /dev/null $API_URL/health
          end_time=$(date +%s%N)
          duration=$(( (end_time - start_time) / 1000000 ))
          echo "Response time: ${duration}ms"
          if [ $duration -gt 1000 ]; then
            echo "⚠️  Warning: Response time exceeded 1 second threshold"
          else
            echo "✅ Response time within acceptable range"
          fi
      
      - name: Verify DynamoDB tables
        run: |
          echo "Verifying DynamoDB tables..."
          tables=("Users" "GlucoseReadings" "FoodLogs" "UsageTracking")
          for table in "${tables[@]}"; do
            status=$(aws dynamodb describe-table --table-name "AiDietSystem-prod-$table" --query 'Table.TableStatus' --output text 2>/dev/null || echo "NOT_FOUND")
            if [ "$status" == "ACTIVE" ]; then
              echo "✅ Table $table is ACTIVE"
            else
              echo "❌ Table $table status: $status"
              exit 1
            fi
          done
      
      - name: Verify S3 buckets
        run: |
          echo "Verifying S3 buckets..."
          buckets=("food-images-prod" "reports-prod")
          for bucket in "${buckets[@]}"; do
            if aws s3 ls "s3://$bucket" > /dev/null 2>&1; then
              echo "✅ Bucket $bucket exists"
            else
              echo "❌ Bucket $bucket not found"
              exit 1
            fi
          done
      
      - name: Check CloudWatch alarms
        run: |
          echo "Checking CloudWatch alarms..."
          alarm_count=$(aws cloudwatch describe-alarms --alarm-name-prefix "AiDietSystem-prod" --state-value ALARM --query 'length(MetricAlarms)' --output text)
          if [ "$alarm_count" -gt 0 ]; then
            echo "⚠️  Warning: $alarm_count alarm(s) in ALARM state"
            aws cloudwatch describe-alarms --alarm-name-prefix "AiDietSystem-prod" --state-value ALARM --query 'MetricAlarms[*].[AlarmName,StateReason]' --output table
          else
            echo "✅ No alarms in ALARM state"
          fi

  rollback-on-failure:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-production, smoke-tests]
    if: failure()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1
      
      - name: Initiate rollback
        run: |
          echo "⚠️  Deployment failed, initiating rollback..."
          echo "Manual rollback required - check CloudFormation console"
          echo "Stack: AiDietMealRecommendationStack-prod"
          # Automatic rollback can be dangerous, so we just alert
          # Manual intervention is recommended for production
      
      - name: Send rollback alert
        run: |
          echo "🚨 PRODUCTION DEPLOYMENT FAILED - ROLLBACK REQUIRED"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Time: $(date)"

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-production, smoke-tests]
    if: always()
    
    steps:
      - name: Send success notification
        if: needs.deploy-production.result == 'success' && needs.smoke-tests.result == 'success'
        run: |
          echo "✅ PRODUCTION DEPLOYMENT SUCCESSFUL"
          echo "=================================="
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Time: $(date)"
          echo "All smoke tests passed"
      
      - name: Send failure notification
        if: needs.deploy-production.result == 'failure' || needs.smoke-tests.result == 'failure'
        run: |
          echo "❌ PRODUCTION DEPLOYMENT FAILED"
          echo "=============================="
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Time: $(date)"
          echo "Deploy Status: ${{ needs.deploy-production.result }}"
          echo "Smoke Tests: ${{ needs.smoke-tests.result }}"
          exit 1
