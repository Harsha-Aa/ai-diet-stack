name: Deploy to Dev

on:
  push:
    branches:
      - develop

jobs:
  ci-checks:
    name: Run CI Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-dev:
    name: Deploy to Dev Environment
    runs-on: ubuntu-latest
    needs: [ci-checks]
    environment:
      name: dev
      url: https://dev-api.ai-diet-system.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: us-east-1
      
      - name: Deploy to Dev
        run: npm run cdk:deploy -- --all --require-approval never -c stage=dev
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID_DEV }}
          CDK_DEFAULT_REGION: us-east-1
      
      - name: Get API Gateway URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name AiDietMealRecommendationStack-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
      
      - name: Save deployment info
        run: |
          echo "Deployment completed at $(date)" > deployment-info.txt
          echo "API URL: ${{ steps.get-api-url.outputs.api_url }}" >> deployment-info.txt
          echo "Commit: ${{ github.sha }}" >> deployment-info.txt
      
      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: dev-deployment-info
          path: deployment-info.txt
          retention-days: 30

  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: us-east-1
      
      - name: Get API Gateway URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name AiDietMealRecommendationStack-dev \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
      
      - name: Test API health endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.get-api-url.outputs.api_url }}/health || echo "000")
          if [ "$response" != "200" ]; then
            echo "Health check failed with status code: $response"
            exit 1
          fi
          echo "Health check passed"
      
      - name: Test authentication endpoint
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" ${{ steps.get-api-url.outputs.api_url }}/auth/login -X POST -H "Content-Type: application/json" -d '{}' || echo "000")
          if [ "$response" != "400" ] && [ "$response" != "401" ]; then
            echo "Auth endpoint check failed with unexpected status code: $response"
            exit 1
          fi
          echo "Auth endpoint is responding"

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-dev, smoke-tests]
    if: always()
    
    steps:
      - name: Send success notification
        if: needs.deploy-dev.result == 'success' && needs.smoke-tests.result == 'success'
        run: |
          echo "✅ Dev deployment successful"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
      
      - name: Send failure notification
        if: needs.deploy-dev.result == 'failure' || needs.smoke-tests.result == 'failure'
        run: |
          echo "❌ Dev deployment failed"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          exit 1
