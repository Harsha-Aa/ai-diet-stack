name: Deploy to Staging

on:
  push:
    branches:
      - staging

jobs:
  ci-checks:
    name: Run CI Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-staging:
    name: Deploy to Staging Environment
    runs-on: ubuntu-latest
    needs: [ci-checks]
    environment:
      name: staging
      url: https://staging-api.ai-diet-system.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build TypeScript
        run: npm run build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: us-east-1
      
      - name: Deploy to Staging
        run: npm run cdk:deploy -- --all --require-approval never -c stage=staging
        env:
          CDK_DEFAULT_ACCOUNT: ${{ secrets.AWS_ACCOUNT_ID_STAGING }}
          CDK_DEFAULT_REGION: us-east-1
      
      - name: Get API Gateway URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name AiDietMealRecommendationStack-staging \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
      
      - name: Save deployment info
        run: |
          echo "Deployment completed at $(date)" > deployment-info.txt
          echo "API URL: ${{ steps.get-api-url.outputs.api_url }}" >> deployment-info.txt
          echo "Commit: ${{ github.sha }}" >> deployment-info.txt
          echo "Branch: ${{ github.ref_name }}" >> deployment-info.txt
      
      - name: Upload deployment info
        uses: actions/upload-artifact@v4
        with:
          name: staging-deployment-info
          path: deployment-info.txt
          retention-days: 90

  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: us-east-1
      
      - name: Get API Gateway URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name AiDietMealRecommendationStack-staging \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "API_URL=$API_URL" >> $GITHUB_ENV
      
      - name: Test user registration flow
        run: |
          echo "Testing user registration..."
          response=$(curl -s -X POST $API_URL/auth/register \
            -H "Content-Type: application/json" \
            -d '{
              "email": "test-'$(date +%s)'@example.com",
              "password": "TestPass123!",
              "diabetes_type": "type2",
              "age": 35,
              "weight": 75,
              "height": 175,
              "target_glucose_min": 70,
              "target_glucose_max": 140
            }')
          echo "Registration response: $response"
      
      - name: Test glucose logging flow
        run: |
          echo "Testing glucose logging..."
          # This would require authentication token from registration
          # Placeholder for actual integration test
          echo "Glucose logging test placeholder"
      
      - name: Test food logging flow
        run: |
          echo "Testing food logging..."
          # Placeholder for actual integration test
          echo "Food logging test placeholder"
      
      - name: Test analytics dashboard
        run: |
          echo "Testing analytics dashboard..."
          # Placeholder for actual integration test
          echo "Analytics test placeholder"
      
      - name: Performance test
        run: |
          echo "Running performance tests..."
          # Test API response times
          start_time=$(date +%s%N)
          curl -s -o /dev/null $API_URL/health
          end_time=$(date +%s%N)
          duration=$(( (end_time - start_time) / 1000000 ))
          echo "Health endpoint response time: ${duration}ms"
          if [ $duration -gt 1000 ]; then
            echo "Response time exceeded 1 second threshold"
            exit 1
          fi

  load-tests:
    name: Run Load Tests
    runs-on: ubuntu-latest
    needs: [integration-tests]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: us-east-1
      
      - name: Get API Gateway URL
        id: get-api-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name AiDietMealRecommendationStack-staging \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
      
      - name: Install Artillery
        run: npm install -g artillery@latest
      
      - name: Run load test
        run: |
          echo "config:
            target: '${{ steps.get-api-url.outputs.api_url }}'
            phases:
              - duration: 60
                arrivalRate: 5
                name: Warm up
              - duration: 120
                arrivalRate: 10
                name: Sustained load
          scenarios:
            - name: Health check
              flow:
                - get:
                    url: '/health'" > load-test.yml
          
          artillery run load-test.yml

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-staging, integration-tests, load-tests]
    if: always()
    
    steps:
      - name: Send success notification
        if: needs.deploy-staging.result == 'success' && needs.integration-tests.result == 'success' && needs.load-tests.result == 'success'
        run: |
          echo "✅ Staging deployment successful"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "All integration and load tests passed"
      
      - name: Send failure notification
        if: needs.deploy-staging.result == 'failure' || needs.integration-tests.result == 'failure' || needs.load-tests.result == 'failure'
        run: |
          echo "❌ Staging deployment or tests failed"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Deploy: ${{ needs.deploy-staging.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "Load Tests: ${{ needs.load-tests.result }}"
          exit 1
